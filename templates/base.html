<!doctype html>
<html data-theme="light">

<head>
    <meta charset="utf-8">
    <meta name="author" content="John Y">
    <meta name="description" content="Programming technicalities and musings">

    <title>John Y</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/0.97.8/css/materialize.min.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://netdna.bootstrapcdn.com/font-awesome/3.1.1/css/font-awesome.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <link rel="icon" type="image/png" href="{{ url_for('static', filename='pictures/stanford.ico') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/fonts.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/button.css') }}">

    <script type="text/javascript" src="https://code.jquery.com/jquery-latest.js"></script>
    <script src="{{ url_for('static', filename='js/webfont.js') }}"></script>
    <script src="{{ url_for('static', filename='js/snap.svg-min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/underscore-min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/sequence-diagram-min.js') }}"></script>

    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-119942589-1"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'UA-119942589-1');
    </script>
</head>
<body>
    <nav class="navbar">
      <div class="container">
        <a href="{{ url_for('index') }}"><b>John</b> Y</a>
        <div style="float:right;">
          <ul>
            <!-- Omitted "papers", "projects" -->
            <a href="{{ url_for('publications') }}" class="left{% if request.endpoint == 'publications' %} active{% endif %}"><li>Pubs</li></a>
            <a href="{{ url_for('blogs') }}" class="left{% if request.endpoint in ('blogs', 'page') %} active{% endif %}"><li>Blog</li></a>
            <a href="{{ url_for('news') }}" class="left{% if request.endpoint == 'news' %} active{% endif %}"><li>News</li></a>
            <a href="{{ url_for('resources') }}" class="left{% if request.endpoint == 'resources' %} active{% endif %}"><li>Assets</li></a>
            <a href="{{ url_for('papers') }}" class="left{% if request.endpoint in ('papers', 'paper_tag', 'review') %} active{% endif %}"><li>Reading</li></a>
            <button id="theme-toggle" aria-label="Toggle theme" class="theme-toggle">
              <i class="fa fa-sun-o"></i>
            </button>
          </ul>
        </div>
      </div>
    </nav>
    <div class="container">
      <hr class="navbar-separator">
    </div>
    <div class="container" style="padding-bottom:100px;">
        <br>
        <main id="body-fade">
            {% block content %}
            <p>Default content to be displayed</p>
            {% endblock content %}
        </main>
    </div>
    <nav class="navfoot">
      <div class="container">
        <span class="subtext">&copy; 2026</span>
        <div style="float:right;">
          <a href="https://github.com/john-b-yang"><i class="fa fa-github"></i></a>&thinsp;
          <a href="https://scholar.google.com/citations?user=71G11ksAAAAJ&hl=en"><i class="fa fa-graduation-cap"></i></a>&thinsp;
          <a href="https://www.linkedin.com/in/jyang20"><i class="fa fa-linkedin"></i></a>&thinsp;
          <a href="https://twitter.com/jyangballin"><i class="fa fa-twitter"></i></a>
        </div>
      </div>
    </nav>
    <script src="https://cdn.rawgit.com/google/code-prettify/master/loader/run_prettify.js"></script>
    <script>
      // Theme switching functionality
      const themeToggle = document.getElementById('theme-toggle');
      const html = document.documentElement;
      
      // Check for saved theme preference
      const savedTheme = localStorage.getItem('theme') || 'light';
      html.setAttribute('data-theme', savedTheme);
      updateThemeIcon(savedTheme);
      
      themeToggle.addEventListener('click', () => {
        const currentTheme = html.getAttribute('data-theme');
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        
        html.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateThemeIcon(newTheme);
      });
      
      function updateThemeIcon(theme) {
        const icon = themeToggle.querySelector('i');
        icon.className = theme === 'dark' ? 'fa fa-sun-o' : 'fa fa-moon-o';
      }
    </script>
</body>

</html>
